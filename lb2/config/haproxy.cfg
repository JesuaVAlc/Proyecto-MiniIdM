global
    log stdout format raw local0
    maxconn 2000

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

frontend ldap_front
    bind *:636
    default_backend ldap_back

backend ldap_back
    balance roundrobin
    option tcp-check
    server idm1 idm1.fis.epn.ec:636 check
    server idm2 idm2.fis.epn.ec:636 check