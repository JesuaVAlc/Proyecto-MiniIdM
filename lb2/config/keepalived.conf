vrrp_instance VI_LDAP {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    nopreempt

    authentication {
        auth_type PASS
        auth_pass fis2026
    }

    unicast_src_ip 192.168.25.21
    unicast_peer {
        192.168.25.20
    }

    virtual_ipaddress {
        192.168.25.100/24
    }
}