services:
  ca1:
    build: ./ca
    container_name: ca1
    hostname: ca1
    networks:
      - fis-net
    volumes:
      - ca-data:/etc/fis-ca

  idm1:
    build: ./idm1
    container_name: idm1
    hostname: idm1.fis.epn.ec
    environment:
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - KRB5_ADMIN_PASSWORD=${KRB5_ADMIN_PASSWORD}
      - KRB5_USER_DEFAULT_PASSWORD=${KRB5_USER_DEFAULT_PASSWORD}
    networks:
      fis-net:
        aliases:
          - idm1.fis.epn.ec
    volumes:
      - idm1-ldap-data:/var/lib/ldap
      - idm1-krb5-data:/var/lib/krb5kdc
      - ca-data:/etc/fis-ca:ro
      - krb5-shared:/etc/krb5kdc/shared
    depends_on:
      - ca1

  idm2:
    build: ./idm2
    container_name: idm2
    hostname: idm2.fis.epn.ec
    environment:
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - KRB5_ADMIN_PASSWORD=${KRB5_ADMIN_PASSWORD}
    networks:
      fis-net:
        aliases:
          - idm2.fis.epn.ec
    volumes:
      - idm2-ldap-data:/var/lib/ldap
      - idm2-krb5-data:/var/lib/krb5kdc
      - ca-data:/etc/fis-ca:ro
      - krb5-shared:/etc/krb5kdc/shared
    depends_on:
      - ca1
      - idm1

  client:
    build:
      context: ./client
    container_name: client
    networks:
      - fis-net   
    depends_on:
      - idm1
      - idm2

  lb1:
    build:
      context: ./lb1
    container_name: lb1
    hostname: lb1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      fis-net:
        ipv4_address: 172.28.0.10
    depends_on:
      - idm1
      - idm2

  lb2:
    build:
      context: ./lb2
    container_name: lb2
    hostname: lb2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      fis-net:
        ipv4_address: 172.28.0.11
    depends_on:
      - idm1
      - idm2
      
networks:
  fis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  ca-data:
  idm1-ldap-data:
  idm1-krb5-data:
  idm2-ldap-data:
  idm2-krb5-data:
  krb5-shared: 