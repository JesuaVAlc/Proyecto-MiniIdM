services:
  ca1:
    build: ./ca
    container_name: ca1
    hostname: ca1
    networks:
      - fis-net
    volumes:
      - ca-data:/etc/fis-ca

  idm1:
    build: ./idm1
    container_name: idm1
    hostname: idm1.fis.epn.ec
    environment:
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - KRB5_ADMIN_PASSWORD=${KRB5_ADMIN_PASSWORD}
      - KRB5_USER_DEFAULT_PASSWORD=${KRB5_USER_DEFAULT_PASSWORD}
    networks:
      fis-net:
        aliases:
          - idm1.fis.epn.ec
    volumes:
      - idm1-ldap-data:/var/lib/ldap
      - idm1-krb5-data:/var/lib/krb5kdc
      - ca-data:/etc/fis-ca:ro
      - krb5-shared:/etc/krb5kdc/shared
      - keytabs-shared:/etc/krb5kdc/keytabs-out
    depends_on:
      - ca1

  idm2:
    build: ./idm2
    container_name: idm2
    hostname: idm2.fis.epn.ec
    environment:
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - KRB5_ADMIN_PASSWORD=${KRB5_ADMIN_PASSWORD}
    networks:
      fis-net:
        aliases:
          - idm2.fis.epn.ec
    volumes:
      - idm2-ldap-data:/var/lib/ldap
      - idm2-krb5-data:/var/lib/krb5kdc
      - ca-data:/etc/fis-ca:ro
      - krb5-shared:/etc/krb5kdc/shared
    depends_on:
      - ca1
      - idm1

  client:
    build:
      context: ./client
    container_name: client
    networks:
      - fis-net   
    depends_on:
      - idm1
      - idm2

  lb1:
    build:
      context: ./lb1
    container_name: lb1
    hostname: lb1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      fis-net:
        ipv4_address: 172.28.0.10
    depends_on:
      - idm1
      - idm2

  lb2:
    build:
      context: ./lb2
    container_name: lb2
    hostname: lb2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      fis-net:
        ipv4_address: 172.28.0.11
    depends_on:
      - idm1
      - idm2
      
  web1:
    build:
      context: ./web1
    container_name: web1
    hostname: web1
    networks:
      fis-net:
        aliases:
          - web1.fis.epn.ec
    volumes:
      - ca-data:/etc/fis-ca:ro
      - keytabs-shared:/etc/krb5kdc/keytabs-in:ro
    ports:
      - "8443:443"
    depends_on:
      - ca1
      - idm1

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    privileged: true
    networks:
      - fis-net
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8081:8080"

  ldap-exporter-idm1:
    build:
      context: ./ldap-exporter
    container_name: ldap-exporter-idm1
    environment:
      - LDAP_HOST=idm1
      - LDAP_BIND_DN=cn=admin,${LDAP_BASE_DN}
      - LDAP_BIND_PASSWORD=${LDAP_ADMIN_PASSWORD}
    networks:
      - fis-net
    depends_on:
      - idm1

  ldap-exporter-idm2:
    build:
      context: ./ldap-exporter
    container_name: ldap-exporter-idm2
    environment:
      - LDAP_HOST=idm2
      - LDAP_BIND_DN=cn=admin,${LDAP_BASE_DN}
      - LDAP_BIND_PASSWORD=${LDAP_ADMIN_PASSWORD}
    networks:
      - fis-net
    depends_on:
      - idm2

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - fis-net
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - fis-net
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      
networks:
  fis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  ca-data:
  idm1-ldap-data:
  idm1-krb5-data:
  idm2-ldap-data:
  idm2-krb5-data:
  krb5-shared: 
  keytabs-shared: 