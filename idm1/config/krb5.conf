[libdefaults]
    default_realm = FIS.EPN.EC
    dns_lookup_realm = false
    dns_lookup_kdc = false
    ticket_lifetime = 10h
    renew_lifetime = 1d
    forwardable = true
    rdns = false

[realms]
    FIS.EPN.EC = {
        kdc = idm1.fis.epn.ec
        kdc = idm2.fis.epn.ec
        admin_server = idm1.fis.epn.ec
    }

[domain_realm]
    .fis.epn.ec = FIS.EPN.EC
    fis.epn.ec = FIS.EPN.EC