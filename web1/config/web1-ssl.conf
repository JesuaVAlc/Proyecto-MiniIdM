<VirtualHost *:443>
    ServerName web1.fis.epn.ec
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/certs/web1.cert.pem
    SSLCertificateKeyFile /etc/apache2/certs/web1.key.pem
    SSLCACertificateFile /etc/apache2/certs/ca.cert.pem

    <Directory /var/www/html>
        Options +Includes
        AddOutputFilter INCLUDES .shtml
        DirectoryIndex index.shtml

        AuthType GSSAPI
        AuthName "FIS Kerberos Login"
        GssapiCredStore keytab:/etc/apache2/keytabs/web1-http.keytab
        Require valid-user
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/web1_error.log
    CustomLog ${APACHE_LOG_DIR}/web1_access.log combined
</VirtualHost>