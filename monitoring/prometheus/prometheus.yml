global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'ldap-idm1'
    static_configs:
      - targets: ['ldap-exporter-idm1:9330']

  - job_name: 'ldap-idm2'
    static_configs:
      - targets: ['ldap-exporter-idm2:9330']